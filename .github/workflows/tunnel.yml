name: Tunnel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install aiohttp

      - name: Install bore
        run: |
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv bore /usr/local/bin/

      - name: Start server
        run: |
          python3 server.py &
          sleep 2
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Start tunnel
        run: |
          bore local 3000 --to bore.pub 2>&1 | tee /tmp/bore.log &
          sleep 3
          cat /tmp/bore.log

      - name: Keep alive
        run: |
          echo "=== r/place 2 tunnel active ==="
          echo "Server PID: ${{ env.SERVER_PID }}"
          echo ""
          echo "Check Actions log above for the bore URL"
          echo "Then open: https://r-place-2.github.io?backend=bore.pub:PORT"
          sleep infinity
